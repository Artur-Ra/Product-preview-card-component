<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Product Preview Card Component</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: hsl(30, 38%, 92%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      max-width: 350px;
    }

    .product-img {
      width: 100%;
      display: block;
    }

    .content {
      padding: 24px;
    }

    .category {
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 12px;
      color: hsl(228, 12%, 48%);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 16px;
      color: hsl(212, 21%, 14%);
    }

    .description {
      font-size: 14px;
      line-height: 1.6;
      color: hsl(228, 12%, 48%);
      margin-bottom: 24px;
    }

    .price-box {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .price {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      color: hsl(158, 36%, 37%);
    }

    .old-price {
      text-decoration: line-through;
      color: hsl(228, 12%, 48%);
      font-size: 14px;
    }

    button {
      width: 100%;
      background: hsl(158, 36%, 37%);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: hsl(158, 36%, 25%);
    }

	@media (min-width: 700px) {
	  .card {
		display: flex;
		max-width: 600px;
	  }

	  .product-img {
		width: 100%;
		height: 100%;
		object-fit: cover;
	  }

	  .content {
		width: 50%;
		padding: 32px;
	  }
	}

    }
  </style>
</head>

<body>

  <div class="card">
    <picture>
      <source media="(min-width: 700px)" srcset="./images/image-product-desktop.jpg">
      <img src="./images/image-product-mobile.jpg" alt="Gabrielle perfume bottle" class="product-img">
    </picture>

    <div class="content">
      <p class="category">Perfume</p>

      <h1>Gabrielle Essence Eau De Parfum</h1>

      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="price-box">
        <span class="price">$149.99</span>
        <span class="old-price">$169.99</span>
      </div>

      <button>
        <img src="./images/icon-cart.svg" alt="">
        Add to Cart
      </button>
    </div>
  </div>

</body>
</html>
